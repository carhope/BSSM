<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .black-bg {
    width : 100%;
    height : 100%;
    position : fixed;
    background : black;
    padding: 30px;
    display : none;
    }
    .white-bg {
    background: white;
    border-radius: 5px;
    padding: 30px;
    display : block;
    } 

    .set-modal{
    display: block;
    }
    </style>
</head>
<body>

    <div class="black-bg">
    <div class="white-bg">
        <h4>로그인하세요</h4>
        <h4 id="mss">몇초뒤에 닫힘</h4>
        <button id="close">닫기</button>
    </div>
    </div> 

    <button id="login">로그인</button>

<button id="dark-btn">다크모드</button>
    <script>
    document.querySelector('#login').addEventListener('click', function(){
        document.querySelector('.black-bg').classList.add('set-modal');

    })

    document.querySelector('#close').addEventListener('click', function(){
        document.querySelector('.black-bg').classList.remove('set-modal');

    })
    // js_01_07.html

    document.querySelector('.black-bg').addEventListener('click', function(e) {
	if (e.target === document.querySelector('.black-bg') ) {
		document.querySelector('.black-bg').classList.remove('set-modal');
	}
    })
    let isDark = false;
    document.querySelector('#dark-btn').addEventListener('click', function() {
        isDark = !isDark
        const whiteBg = document.querySelector('.white-bg')
        
    document.querySelector('.white-bg').style.background = isDark ? 'black' : 'white'
    document.querySelector('body').style.background = isDark ? 'black' : 'rgba(0,0,0,0.0)'
        this.innerText = isDark ? '라이트모드' : '다크모드'
    })
  document.addEventListener('keydown',function(e){
    if (e.key =='Escape'){
        document.querySelector('.black-bg').classList.remove('set-modal');
    }
  })
  let a=100;
  for (let i=0;i!=100;i++){
  document.setinterval(a,function(){
    if (document.querySelector('.balck-bg').style.display===block){
        if (a!=0){
        document.innerhtml("{a}초 후에 감")
        document.setinterval(a-1,function(){
            a=a-1;
            document.innerhtml.getElementById(mss)
        
        })
        }
        else {
            document.querySelector('.black-bg').classList.remove('set-modal');
        }
    }
  })
  }

    </script>
</body>
</html>
