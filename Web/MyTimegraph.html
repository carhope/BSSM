<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>차희망의 시간표</title>
    <style>
        /* 표를 표답게 만드는 디자인 설정 */
        table {
            width: 100%;
            border-collapse: collapse; /* 테두리 겹침 방지 */
            text-align: center;
        }
        th, td {
            border: 1px solid #444444; /* 테두리 선 긋기 */
            padding: 15px; /* 칸 안의 여백 */
            height: 50px; /* 칸의 최소 높이 */
        }
        th {
            background-color: #eeeeee; /* 요일 칸 배경색 */
            font-weight: bold;
        }
        .period {
            background-color: #f9f9f9; /* 교시 칸 배경색 */
            width: 80px;
        }
    </style>
</head>
<body>

    <h2>📅 1학년 2반 차희망 시간표</h2>

    <table>
        <tr>
            <th>교시</th>
            <th>월</th>
            <th>화</th>
            <th>수</th>
            <th>목</th>
            <th>금</th>
        </tr>

        <tr>
            <td class="period">1 (8:40)</td>
            <td>자료구조</td>
            <td>자구</td>
            <td>프로</td>
            <td>프로</td>
            <td>컴그</td>
        </tr>

        <tr>
            <td class="period">2 (9:40)</td>
            <td>자구</td>
            <td>자구</td>
            <td>프로</td>
            <td>프로</td>
            <td>컴그</td>
        </tr>

        <tr>
            <td class="period">3 (10:40)</td>
            <td>사회</td>
            <td>체육</td>
            <td>프로</td>
            <td>프로</td>
            <td>영어A</td>
        </tr>

        <tr>
            <td class="period">4 (11:40)</td>
            <td>과학</td>
            <td>컴구</td>
            <td>과학</td>
            <td>컴구</td>
            <td>수학</td>
        </tr>

        <tr>
            <td class="period">5 (1:20)</td>
            <td>영어A</td>
            <td>진로독서</td>
            <td>영어B</td>
            <td>체육</td>
            <td>CA</td>
        </tr>
        
        <tr>
            <td class = "period">6 (2:20)</td>
            <td>컴그</td>
            <td>사회</td>
            <td>사회</td>
            <td>수학</td>
            <td>CA</td>
            

        </tr>

        <tr>
            <td class = "period">7 (3:20)</td>
            <td>수학</td>
            <td></td>
            <td></td>
            <td>과학</td>
            <td>자습</td>
        </tr>


    </table>

</body>
</html>
