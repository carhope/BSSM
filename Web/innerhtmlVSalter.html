<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>alert vs innerHTML 실습</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f9f9f9;
            font-family: sans-serif;
        }
        .btn-group { margin-bottom: 30px; }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 0 10px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
        }
        #alert-btn { background-color: #ff4d4d; color: white; }
        #html-btn { background-color: #4da6ff; color: white; }
        
        /* 마법이 일어날 빈 상자 */
        #stage {
            width: 300px;
            height: 100px;
            border: 2px dashed #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background-color: white;
        }
    </style>
</head>
<body>

    <div class="btn-group">
        <button id="alert-btn">1번: alert 버튼</button>
        <button id="html-btn">2번: innerHTML 버튼</button>
    </div>

    <div id="stage">여기는 원래 비어있는 무대입니다.</div>

    <script>
        const alertBtn = document.querySelector("#alert-btn");
        const htmlBtn = document.querySelector("#html-btn");
        const stage = document.querySelector("#stage");

        // 🚨 1. alert: 브라우저 상단 시스템 팝업창
        alertBtn.addEventListener("click", function() {
            alert("이 경고창은 웹페이지 '밖'인 브라우저 꼭대기에 삐빅- 뜨는 창입니다!");
        });

        // 🧼 2. innerHTML: HTML 문서 내부 침투
        htmlBtn.addEventListener("click", function() {
            // 무대(stage)의 안쪽 내용을 통째로 바꿉니다. 태그도 먹혀요!
            stage.innerHTML = "<span style='color: blue; font-weight: bold;'>펑! 💥 웹페이지 내부가 바뀌었어요!</span>";
        });
    </script>

</body>
</html>
