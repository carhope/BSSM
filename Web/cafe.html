<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <form>
        <h1>카페주문 & 선호도 조사</h1>
        
        <ol>
            <h2>주문 방법</h2>
            <li>음료를 선택한다.</li>
            <li>추가 옵션을 고른다.</li>
            <li>개인정보를 입력한다.</li>
            <li>주문 버튼을 누른다.</li>

        </ol>
        <h2>인기 메뉴</h2>
        <ul>
            <li>아메리카노</li>
            <li>카페라떼</li>
            <li>바닐라라떼</li>
            <li>초코 프라푸치노</li>
        </ul>
        <form>
            <fieldset>
                <ol>
                <legend><li>기본 정보</li></legend>
                <label>
                    이름:<input>
                    학번:<input>
                </label>
                </ol>
            </fieldset>
        </form>
        <form>
            <fieldset>
                
                    <legend>2. 음료 선택</legend>
                    <ul>
                        <label for="name"><input name="co" type="radio">아메리카노</label><br>
                        <label for="name"><input name="co" type="radio">카페라떼</label><br>
                        <label for="name"><input name="co" type="radio">바닐라라떼</label>
                    </ul>
            </fieldset>
        </form>
        <form>
            <fieldset>
                <legend>3. 추가옵션</legend>
                <label>
                    <input type="checkbox">아이스<br>
                    <input type="checkbox">샷 추가<br>
                    <input type="checkbox">시럽 추가
                </label>
            </fieldset>
        </form>
        <form>
            <fieldset>
                <legend>4. 요청 사항</legend>
                <label>
                    <textarea>
                    </textarea>
                </label>
            </fieldset>
            <button>주문하기</button>
            <button type="reset">다시 작성</button>
        </form>
        
    </form>
