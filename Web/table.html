<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table width ="500" border="1" cellapadding="100" cellspcing ="100" bordercolor ="blue">
        <caption>
            <strong>자기소개서</strong>
            <p>자기소개서 기본 양식</p>
        </caption>
        <colgroup>
            <col style ="width : 100px">
            <col style ="width : 300px">
            <col style ="width : 300px">
            <col style ="width : 300px">
            <col style ="width : 300px">
        </colgroup>
        <tr>
            <th>이름</td>
            <td>차희망</td>
            <th>연락처</td>
            <td>010-9600-7935</td>
        </tr>
        <tr>
            <th>주소</td>
            <td colspan="3">경상남도 김해시 어딘가 어디지 어디냐 어디야</td>
        </tr>
        <tr>
            <th>자기소개</td>
            <td colspan="3">안녕하십니까 1학년2반 차희망입니다 잘부탁드립니다.</td>

        </tr>
        <tr>
            <th>현재 심정</td>
            <td colspan ="3">너무 피곤하다 잘거같음 지금 바닥에 누우면 잔다</td>

        </tr>
    </table>
    <label class = "reg" for ="class">학과</label>
    <select  id="class">
        <optgroup label="공과대학">
            <option value="archi">건축공학과</option>
            <option value="mechanic">기계공학과</option>
            <option value="indust">산업공하과</option>
            <option value="elec">전기전자공학과</option>
            <option value="computer">컴퓨터공학과</option>
            <option value="chemical">화학공학과</option>
        </optgroup>
        <optgroup label="인문대학">
            <option value="social">사학과</option>
            <option value="languge">어문학부</option>
            <option value="phlisop">철학</option>
        </optgroup>
    </select>
    <input type="text" id="interest" list="choices">
    <datalist id="choices">

        <option value="grammar" label="문법"></option>
        <option value="voca" label="어휘"></option>
        <option value="news" label="뉴스청취"></option>
    </datalist>
    <ul>
        <li>
            <label>10초 남음</label>
            <progress value="90" max="100"></progress>
        </li>
        <li>
            <label>10초 남음</label>
            <progress value="30" max="100"></progress>
        </li>
    </ul>
    <form>
        <fieldset>
            <legend>도형 서식 입력</legend>
            <label class="" for="class">
                선종류
                <select id="class">
                    
                    <option >선없음</option>
                    <option >실선</option>
                    <option>점선</option>
                </select><br>
                선두께<input type="number"><br>
                선색상<input type="color"><br>
                선길이<input type="range">
            </label>
        </fieldset>
    </form>

</body>
</html>
