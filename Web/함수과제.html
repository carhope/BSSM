<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .alert_box{
            background-color :skyblue;
            padding:20px;
            color:white;
            border-radius: 5px;
            display:none;
        }
    </style>
</head>
<body>
    
    <button onclick="doalert('block')">열림버튼</button>
    <button onclick="doalert('none')">닫힘버튼</button>
    <div class="alert_box" id="a">알림창</div>
    
    <script>

        function doalert(x){
            document.getElementById('a').style.display=x;
        }
    </script>
</body>
</html>
